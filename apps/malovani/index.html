<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malování</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
  <style>
    /* ── Hub theme variable defaults ── */
    :root {
      --th-bg:         #060f18;
      --th-bg-panel:   #07101c;
      --th-bg-card:    #0b1622;
      --th-bg-hover:   rgba(59,158,255,0.08);
      --th-accent:     #3b9eff;
      --th-accent-dim: rgba(59,158,255,0.15);
      --th-accent-rgb: 59,158,255;
      --th-text:       #d0e8ff;
      --th-text-mid:   #8ab8d8;
      --th-text-dim:   #3a6080;
      --th-border:     #1a3050;
      --th-font:       'Inter', sans-serif;
      --th-radius-md:  6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100vh;
      background: var(--th-bg-panel);
      color: var(--th-text);
      font-family: var(--th-font);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Toolbar ──────────────────────────────────────── */
    #toolbar {
      height: 56px;
      background: var(--th-bg);
      border-bottom: 1px solid var(--th-border);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .tb-sep {
      width: 1px;
      height: 30px;
      background: var(--th-border);
      margin: 0 2px;
      flex-shrink: 0;
    }

    /* Segmented tool group */
    .tool-group {
      display: flex;
      background: var(--th-bg-card);
      border: 1px solid var(--th-border);
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .tool-group .tb-btn {
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      border-right: 1px solid var(--th-border);
      border-radius: 0;
      color: var(--th-text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: background 0.12s, color 0.12s;
    }
    .tool-group .tb-btn:last-child { border-right: none; }
    .tool-group .tb-btn:hover  { background: var(--th-bg-hover); color: var(--th-text-mid); }
    .tool-group .tb-btn.active { background: rgba(var(--th-accent-rgb),0.22); color: var(--th-accent); }

    /* Standalone toolbar button */
    .tb-btn {
      background: var(--th-bg-card);
      border: 1px solid var(--th-border);
      border-radius: var(--th-radius-md);
      color: var(--th-text-dim);
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .tb-btn:hover { background: var(--th-bg-hover); border-color: rgba(var(--th-accent-rgb),0.2); color: var(--th-text-mid); }

    /* Brush section */
    .brush-section {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .brush-label {
      font-size: 10px;
      color: var(--th-text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    #brushRange {
      -webkit-appearance: none;
      width: 90px;
      height: 3px;
      background: var(--th-border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #brushRange::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--th-accent);
      cursor: pointer;
      border: 2px solid var(--th-bg);
    }

    #brushSizeVal {
      font-size: 12px;
      font-weight: 600;
      color: var(--th-text-mid);
      min-width: 24px;
      text-align: right;
    }

    /* Color section */
    .color-section {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    #currentColorBtn {
      width: 36px;
      height: 36px;
      border-radius: var(--th-radius-md);
      border: 2px solid var(--th-border);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s;
      background: #000000;
    }
    #currentColorBtn:hover { border-color: var(--th-accent); }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(8, 18px);
      gap: 3px;
    }

    .color-swatch {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: border-color 0.1s, transform 0.12s;
    }
    .color-swatch:hover  { transform: scale(1.18); border-color: rgba(255,255,255,0.25); }
    .color-swatch.active { border-color: var(--th-accent); }

    #customColor {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      border: 1.5px solid var(--th-border);
      padding: 0;
      cursor: pointer;
      background: none;
      overflow: hidden;
      flex-shrink: 0;
    }
    #customColor::-webkit-color-swatch-wrapper { padding: 0; }
    #customColor::-webkit-color-swatch { border: none; border-radius: 2px; }

    /* ── Canvas area ──────────────────────────────────── */
    #canvasWrap {
      flex: 1;
      overflow: auto;
      background: var(--th-bg);
      padding: 16px;
      position: relative;
    }

    /* Shell holds canvas + resize handle */
    #canvasShell {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    #drawCanvas {
      display: block;
      background: #ffffff;
      cursor: crosshair;
      box-shadow: 0 0 0 1px var(--th-border), 0 8px 36px rgba(0,0,0,0.55);
    }

    /* Resize handle */
    #resizeHandle {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 22px;
      height: 22px;
      cursor: se-resize;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 4px;
    }
    #resizeHandle svg {
      width: 11px;
      height: 11px;
      opacity: 0.3;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    #resizeHandle:hover svg { opacity: 1; }

    /* ── Status bar ───────────────────────────────────── */
    #statusBar {
      height: 28px;
      background: var(--th-bg);
      border-top: 1px solid var(--th-border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 11px;
      color: var(--th-text-dim);
      flex-shrink: 0;
    }

    .sb-item {
      padding: 0 12px;
      border-right: 1px solid var(--th-border);
    }
    .sb-item:first-child { padding-left: 0; }
    .sb-item:last-child  { border-right: none; }

    #statusTool { color: #3a6888; font-weight: 500; }
  </style>
</head>
<body>

<!-- ── Toolbar ──────────────────────────────────────────── -->
<div id="toolbar">

  <!-- Segmented tools -->
  <div class="tool-group">
    <button class="tb-btn active" id="toolPen"    title="Tužka"><i class="fa-solid fa-pencil"></i></button>
    <button class="tb-btn"        id="toolEraser" title="Guma"><i class="fa-solid fa-eraser"></i></button>
    <button class="tb-btn"        id="toolLine"   title="Čára"><i class="fa-solid fa-minus"></i></button>
    <button class="tb-btn"        id="toolRect"   title="Obdélník"><i class="fa-regular fa-square"></i></button>
    <button class="tb-btn"        id="toolCircle" title="Elipsa"><i class="fa-regular fa-circle"></i></button>
    <button class="tb-btn"        id="toolFill"   title="Výplň"><i class="fa-solid fa-fill-drip"></i></button>
  </div>

  <div class="tb-sep"></div>

  <!-- Brush size -->
  <div class="brush-section">
    <span class="brush-label">Štětec</span>
    <input type="range" id="brushRange" min="1" max="60" value="4" />
    <span id="brushSizeVal">4</span>
  </div>

  <div class="tb-sep"></div>

  <!-- Color -->
  <div class="color-section">
    <div id="currentColorBtn" title="Aktuální barva (klik = výběr)"></div>
    <div class="palette-grid" id="swatchWrap"></div>
    <input type="color" id="customColor" value="#000000" title="Vlastní barva" />
  </div>

  <div class="tb-sep"></div>

  <!-- Actions -->
  <div style="display:flex;gap:5px;flex-shrink:0">
    <button class="tb-btn" id="btnUndo"  title="Zpět (Ctrl+Z)"><i class="fa-solid fa-rotate-left"></i></button>
    <button class="tb-btn" id="btnRedo"  title="Znovu (Ctrl+Y)"><i class="fa-solid fa-rotate-right"></i></button>
    <button class="tb-btn" id="btnClear" title="Smazat vše"><i class="fa-solid fa-trash"></i></button>
    <button class="tb-btn" id="btnSave"  title="Uložit PNG"><i class="fa-solid fa-floppy-disk"></i></button>
  </div>

</div>

<!-- ── Canvas ───────────────────────────────────────────── -->
<div id="canvasWrap">
  <div id="canvasShell">
    <canvas id="drawCanvas"></canvas>
    <div id="resizeHandle">
      <svg viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 10L10 1M4.5 10L10 4.5M8 10L10 8" stroke="#4a9edd" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

<!-- ── Status bar ───────────────────────────────────── -->
<div id="statusBar">
  <span class="sb-item" id="statusTool">Tužka</span>
  <span class="sb-item" id="statusCoords">X: 0  Y: 0</span>
  <span class="sb-item" id="statusSize"></span>
</div>

<script>
'use strict';

const canvas  = document.getElementById('drawCanvas');
const ctx     = canvas.getContext('2d');
const wrap    = document.getElementById('canvasWrap');
const statusC = document.getElementById('statusCoords');
const statusS = document.getElementById('statusSize');
const statusT = document.getElementById('statusTool');

// ── Undo / Redo ─────────────────────────────────────────── //
let undoStack = [];
let redoStack = [];

// ── Canvas init ────────────────────────────────────────── //
function initCanvas() {
  const availW = Math.max(wrap.clientWidth  - 32, 400);
  const availH = Math.max(wrap.clientHeight - 32, 300);
  canvas.width  = availW;
  canvas.height = availH;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  statusS.textContent = `${canvas.width} × ${canvas.height} px`;
  undoStack = [];
  redoStack = [];
  saveState();
}
initCanvas();

function saveState() {
  undoStack.push(canvas.toDataURL());
  if (undoStack.length > 40) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length < 2) return;
  redoStack.push(undoStack.pop());
  restoreState(undoStack[undoStack.length - 1]);
}

function redo() {
  if (!redoStack.length) return;
  const state = redoStack.pop();
  undoStack.push(state);
  restoreState(state);
}

function restoreState(dataURL) {
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
  img.src = dataURL;
}

// ── Tools ────────────────────────────────────────────────── //
let tool      = 'pen';
let color     = '#000000';
let brushSize = 4;
let drawing   = false;
let startX    = 0;
let startY    = 0;
let snapshot  = null;

const TOOL_NAMES   = { pen:'Tužka', eraser:'Guma', line:'Čára', rect:'Obdélník', circle:'Elipsa', fill:'Výplň' };
const TOOL_CURSORS = { pen:'crosshair', eraser:'cell', line:'crosshair', rect:'crosshair', circle:'crosshair', fill:'cell' };

const TOOLS = ['toolPen','toolEraser','toolLine','toolRect','toolCircle','toolFill'];
TOOLS.forEach(id => {
  document.getElementById(id).addEventListener('click', () => {
    TOOLS.forEach(t => document.getElementById(t).classList.remove('active'));
    document.getElementById(id).classList.add('active');
    tool = id.replace('tool','').toLowerCase();
    statusT.textContent     = TOOL_NAMES[tool]   || tool;
    canvas.style.cursor     = TOOL_CURSORS[tool] || 'crosshair';
  });
});

// ── Brush size ───────────────────────────────────────────── //
const brushRange   = document.getElementById('brushRange');
const brushSizeVal = document.getElementById('brushSizeVal');

brushRange.addEventListener('input', () => {
  brushSize = parseInt(brushRange.value, 10);
  brushSizeVal.textContent = brushSize;
});

// ── Color helpers ─────────────────────────────────────────── //
const currentColorBtn  = document.getElementById('currentColorBtn');
const customColorInput = document.getElementById('customColor');

function setColor(c) {
  color = c;
  currentColorBtn.style.background = c;
  customColorInput.value = c;
}

currentColorBtn.addEventListener('click', () => customColorInput.click());

// ── Color palette ─────────────────────────────────────────── //
const PALETTE = [
  '#000000','#ffffff','#c0c0c0','#808080',
  '#ff0000','#ff6600','#ffcc00','#00cc00',
  '#0066ff','#9900cc','#ff66cc','#00cccc',
  '#664400','#a0522d','#1a3a60','#4a9edd',
];

const swatchWrap = document.getElementById('swatchWrap');
PALETTE.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch';
  sw.style.background = c;
  if (c === color) sw.classList.add('active');
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    setColor(c);
  });
  swatchWrap.appendChild(sw);
});

customColorInput.addEventListener('input', e => {
  setColor(e.target.value);
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

// ── Drawing helpers ─────────────────────────────────────── //
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return { x: Math.round(src.clientX - rect.left), y: Math.round(src.clientY - rect.top) };
}

function applyStyle(eraserMode) {
  ctx.strokeStyle = eraserMode ? '#ffffff' : color;
  ctx.fillStyle   = color;
  ctx.lineWidth   = brushSize;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
}

// Flood fill ─────────────────────────────────────────────── //
function floodFill(sx, sy, fillColor) {
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data    = imgData.data;
  const idx     = (sy * canvas.width + sx) * 4;
  const tr = data[idx], tg = data[idx+1], tb = data[idx+2], ta = data[idx+3];

  const fr = parseInt(fillColor.slice(1,3), 16);
  const fg = parseInt(fillColor.slice(3,5), 16);
  const fb = parseInt(fillColor.slice(5,7), 16);

  if (tr === fr && tg === fg && tb === fb) return;

  const match = i => data[i]===tr && data[i+1]===tg && data[i+2]===tb && data[i+3]===ta;
  const set   = i => { data[i]=fr; data[i+1]=fg; data[i+2]=fb; data[i+3]=255; };

  const stack = [sx + sy * canvas.width];
  const visited = new Uint8Array(canvas.width * canvas.height);
  visited[sx + sy * canvas.width] = 1;

  while (stack.length) {
    const pos = stack.pop();
    const x = pos % canvas.width;
    const y = (pos - x) / canvas.width;
    set(pos * 4);
    const neighbors = [];
    if (x > 0)               neighbors.push(pos - 1);
    if (x < canvas.width-1)  neighbors.push(pos + 1);
    if (y > 0)               neighbors.push(pos - canvas.width);
    if (y < canvas.height-1) neighbors.push(pos + canvas.width);
    for (const n of neighbors) {
      if (!visited[n] && match(n * 4)) { visited[n] = 1; stack.push(n); }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// ── Mouse / Touch events ─────────────────────────────────── //
function onDown(e) {
  e.preventDefault();
  const { x, y } = getPos(e);
  drawing = true;
  startX  = x;
  startY  = y;

  if (tool === 'fill') {
    floodFill(x, y, color);
    saveState();
    return;
  }

  snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  applyStyle(tool === 'eraser');

  if (tool === 'pen' || tool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(x, y);
  }
}

function onMove(e) {
  e.preventDefault();
  const { x, y } = getPos(e);
  statusC.textContent = `X: ${x}  Y: ${y}`;
  if (!drawing) return;

  applyStyle(tool === 'eraser');

  if (tool === 'pen' || tool === 'eraser') {
    ctx.lineTo(x, y);
    ctx.stroke();
    return;
  }

  ctx.putImageData(snapshot, 0, 0);

  if (tool === 'line') {
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(x, y);
    ctx.stroke();
  } else if (tool === 'rect') {
    ctx.strokeRect(startX, startY, x - startX, y - startY);
  } else if (tool === 'circle') {
    const rx = (x - startX) / 2;
    const ry = (y - startY) / 2;
    ctx.beginPath();
    ctx.ellipse(startX + rx, startY + ry, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function onUp(e) {
  if (!drawing) return;
  drawing = false;
  if (tool !== 'fill') saveState();
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove',  onMove, { passive: false });
canvas.addEventListener('touchend',   onUp);

// ── Canvas resize handle ─────────────────────────────────── //
const resizeHandle = document.getElementById('resizeHandle');
let resizing = false, rsX = 0, rsY = 0, rsW = 0, rsH = 0, rsImg = null;

resizeHandle.addEventListener('mousedown', e => {
  e.preventDefault();
  e.stopPropagation();
  resizing = true;
  rsX  = e.clientX;
  rsY  = e.clientY;
  rsW  = canvas.width;
  rsH  = canvas.height;
  rsImg = new Image();
  rsImg.src = canvas.toDataURL();
});

document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const newW = Math.max(100, Math.round(rsW + e.clientX - rsX));
  const newH = Math.max(80,  Math.round(rsH + e.clientY - rsY));
  canvas.width  = newW;
  canvas.height = newH;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, newW, newH);
  if (rsImg && rsImg.complete) ctx.drawImage(rsImg, 0, 0);
  statusS.textContent = `${newW} × ${newH} px`;
});

document.addEventListener('mouseup', () => {
  if (!resizing) return;
  resizing = false;
  rsImg = null;
  saveState();
});

// ── Toolbar actions ──────────────────────────────────────── //
document.getElementById('btnUndo').addEventListener('click',  undo);
document.getElementById('btnRedo').addEventListener('click',  redo);
document.getElementById('btnClear').addEventListener('click', () => {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
});
document.getElementById('btnSave').addEventListener('click', () => {
  const a    = document.createElement('a');
  a.download = 'malovani.png';
  a.href     = canvas.toDataURL('image/png');
  a.click();
});

// ── Keyboard shortcuts ────────────────────────────────────── //
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
});
</script>
<script src="../../js/themes.js"></script>
</body>
</html>
